<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo en vivo • jhoIA</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <nav class="fixed top-0 w-full bg-zinc-950/90 backdrop-blur-lg z-50 border-b border-white/10">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-emerald-400 rounded-2xl flex items-center justify-center text-black font-bold text-2xl">🤖</div>
        <h1 class="text-3xl font-semibold tracking-tighter" style="font-family: 'Space Grotesk', sans-serif;">jhoIA</h1>
      </div>
      <div class="hidden md:flex items-center gap-8 text-sm font-medium">
        <a href="index.html" class="hover:text-emerald-400 transition">Inicio</a>
        <a href="caracteristicas.html" class="hover:text-emerald-400 transition">Cómo funciona</a>
        <a href="demo.html" class="text-emerald-400">Demo en vivo</a>
      </div>
      <a href="index.html" class="text-sm font-medium px-6 py-2.5 rounded-3xl border border-white/30 hover:border-white/70">Volver</a>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto pt-32 pb-12 px-6">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold mb-3">Demo en vivo</h1>
      <p class="text-emerald-400 text-lg">Habla con jhoIA como si fuera un asistente humano</p>
    </div>

    <!-- Chat -->
    <div id="chat" class="bg-zinc-900 rounded-3xl h-[620px] flex flex-col overflow-hidden border border-white/10 shadow-2xl">
      <div id="messages" class="flex-1 p-6 overflow-y-auto space-y-6"></div>

      <div class="p-6 border-t border-white/10 bg-zinc-950">
        <div class="flex gap-3">
          <input id="userInput" type="text" 
                 class="flex-1 bg-zinc-800 border border-white/20 rounded-2xl px-6 py-4 focus:outline-none focus:border-emerald-400 text-white placeholder-zinc-500"
                 placeholder="Ejemplo: Quiero una cita para el viernes a las 4pm">
          <button onclick="sendMessage()" 
                  class="bg-emerald-400 hover:bg-emerald-300 text-black font-semibold px-8 rounded-2xl transition flex items-center justify-center">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
        <p class="text-center text-xs text-zinc-500 mt-4">Demo con IA real (Groq) • Respuestas muy rápidas</p>
      </div>
    </div>
  </div>

  <script>
    // Tu clave ya integrada
    const GROQ_API_KEY = "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";

    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('userInput');

    function addMessage(text, isUser) {
      const msg = document.createElement('div');
      msg.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
      msg.innerHTML = `
        <div class="${isUser ? 'bg-emerald-500 text-black' : 'bg-zinc-800'} max-w-[85%] rounded-3xl px-6 py-4">
          ${text}
        </div>
      `;
      messagesDiv.appendChild(msg);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      addMessage(text, true);
      userInput.value = '';

      // Mensaje "pensando"
      const thinking = document.createElement('div');
      thinking.id = 'thinking';
      thinking.className = 'flex justify-start';
      thinking.innerHTML = `<div class="bg-zinc-800 max-w-[80%] rounded-3xl px-6 py-4">jhoIA está escribiendo<span class="animate-pulse">...</span></div>`;
      messagesDiv.appendChild(thinking);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${GROQ_API_KEY}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: "llama-3.3-70b-versatile",
            messages: [
              { 
                role: "system", 
                content: "Eres jhoIA, un asistente IA muy amable, natural y profesional. Ayudas con reservaciones, citas y responder mensajes de clientes por WhatsApp o Instagram. Siempre respondes en español de forma conversacional y humana, como si fueras una persona real." 
              },
              { role: "user", content: text }
            ],
            temperature: 0.75,
            max_tokens: 600
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        const reply = data.choices[0].message.content;

        document.getElementById('thinking').remove();
        addMessage(reply, false);

      } catch (error) {
        console.error(error);
        document.getElementById('thinking')?.remove();
        addMessage("❌ Hubo un error al conectar con la IA.<br>Verifica que la clave sea correcta y que no haya expirado.", false);
      }
    }

    // Enviar con tecla Enter
    userInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    // Mensaje inicial
    window.onload = () => {
      addMessage("¡Hola! Soy jhoIA 😊<br>¿En qué te ayudo hoy? Puedes pedirme una reservación, cita o cómo responderle a un cliente.", false);
    };
  </script>
</body>
</html>
